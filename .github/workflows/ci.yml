name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

# Compiles the mod against every targeted Minecraft/NeoForge version.
# The three "publish target" rows build the actual shipped jars (legacy 1.21.1,
# modern 1.21.11, next 26.2); the "tripwire" rows recompile the legacy source against
# each other 1.21.x minor to catch future API drift in the shared code. All rows must pass.
# Each era needs a different JDK: 21 for the 1.21.x line, 25 for MC 26.x.
jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { era: legacy, neo: "",         java: 21, label: "legacy 1.21.1 (publish target)" }
          - { era: legacy, neo: "21.3.97",  java: 21, label: "legacy 1.21.3 tripwire" }
          - { era: legacy, neo: "21.4.157", java: 21, label: "legacy 1.21.4 tripwire" }
          - { era: legacy, neo: "21.5.98",  java: 21, label: "legacy 1.21.5 tripwire" }
          - { era: legacy, neo: "21.8.54",  java: 21, label: "legacy 1.21.8 tripwire" }
          - { era: legacy, neo: "21.10.64", java: 21, label: "legacy 1.21.10 tripwire" }
          - { era: modern, neo: "",         java: 21, label: "modern 1.21.11 (publish target)" }
          - { era: next,   neo: "",         java: 25, label: "next 26.2 (publish target)" }
    steps:
      - uses: actions/checkout@v5

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '${{ matrix.java }}'

      - name: Cache Gradle + neoformruntime
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.label }}-${{ matrix.neo }}-${{ hashFiles('**/*.gradle', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ matrix.label }}-${{ matrix.neo }}-
            gradle-${{ matrix.label }}-

      - name: Build (${{ matrix.era }} era)
        run: |
          args="-Pera=${{ matrix.era }}"
          if [ -n "${{ matrix.neo }}" ]; then args="$args -PneoVersion=${{ matrix.neo }}"; fi
          ./gradlew build --no-daemon --stacktrace $args

      - name: Upload jar (publish targets only)
        if: matrix.neo == ''
        uses: actions/upload-artifact@v7
        with:
          name: jar-${{ matrix.era }}
          path: build/libs/tweakable_xp_loss-*.jar
          if-no-files-found: error
