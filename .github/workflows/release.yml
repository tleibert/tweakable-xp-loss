name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

# Builds all three era jars and publishes each as a separate Modrinth version, then attaches
# all jars to a GitHub Release. Triggered by pushing a tag like `v1.1.0`.
#
# Prerequisites (one-time setup — see the repo README / docs/PORTING.md):
#   1. The Modrinth project with slug "tweakable-xp-loss" must already exist (create it as a
#      draft via the Modrinth dashboard first; Minotaur cannot create the project).
#   2. A GitHub Actions secret named MODRINTH_TOKEN containing a Modrinth API token with the
#      VERSION_CREATE and VERSION_WRITE scopes (https://modrinth.com/settings/account).
#      VERSION_CREATE publishes each version; VERSION_WRITE sets the per-version environment
#      fields (client_side/server_side) in the final step below.
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      # The legacy/modern eras compile on Java 21; the next era (MC 26.x) requires Java 25.
      # Install both so Gradle's toolchain resolution finds each without auto-provisioning.
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Gradle + neoformruntime
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: release-gradle-${{ hashFiles('**/*.gradle', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            release-gradle-

      - name: Publish legacy jar to Modrinth (MC 1.21.1-1.21.10)
        run: ./gradlew modrinth -Pera=legacy --no-daemon --stacktrace

      - name: Publish modern jar to Modrinth (MC 1.21.11)
        run: ./gradlew modrinth -Pera=modern --no-daemon --stacktrace

      - name: Publish next jar to Modrinth (MC 26.2, beta)
        run: ./gradlew modrinth -Pera=next --no-daemon --stacktrace

      - name: Collect jars
        run: |
          mkdir -p artifacts
          cp build/libs/tweakable_xp_loss-*.jar artifacts/
          ls -la artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*.jar

      # Modrinth derives a project's environment (client_side / server_side) from per-version
      # boolean "fields" (singleplayer / client_and_server / client_only / server_only), not
      # from project metadata. Minotaur can't send version fields, so after the uploads we PATCH
      # every version of this project via the v3 API with the server-side-mod field set, which
      # derives to client_side=unsupported / server_side=required (the standard convention for a
      # server-side mod: clients don't need it installed; it also works in singleplayer because
      # the integrated server runs in-process, but that nuance isn't representable in the field
      # system). Idempotent and run on every release so already-published versions stay correct.
      # Best-effort (continue-on-error): if MODRINTH_TOKEN lacks VERSION_WRITE scope this cannot
      # block the uploads/GitHub Release above; a failure emits a visible ::error annotation.
      - name: Set Modrinth environment metadata on all versions (server-side mod)
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Patching environment fields on all versions of tweakable-xp-loss..."
          ids=$(curl -sS -H "Authorization: ${MODRINTH_TOKEN}" \
            "https://api.modrinth.com/v2/project/tweakable-xp-loss/version" \
            | python3 -c "import sys,json; [print(v['id']) for v in json.load(sys.stdin)]")
          if [ -z "${ids:-}" ]; then
            echo "::error::No versions returned for tweakable-xp-loss; cannot set env metadata."
            exit 1
          fi
          ok=0; fail=0
          for id in $ids; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' -X PATCH \
              "https://api.modrinth.com/v3/version/$id" \
              -H "Authorization: ${MODRINTH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"fields":{"singleplayer":true,"client_and_server":true,"client_only":false,"server_only":true}}')
            echo "  version $id -> HTTP $code"
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then ok=$((ok+1)); else fail=$((fail+1)); fi
          done
          echo "Patched: $ok ok, $fail failed"
          if [ "$fail" -gt 0 ]; then
            echo "::error::Failed to set env metadata on $fail version(s). Ensure MODRINTH_TOKEN has VERSION_WRITE scope."
            exit 1
          fi
