name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

# Builds all three era jars and publishes each as a separate Modrinth version, then attaches
# all jars to a GitHub Release. Triggered by pushing a tag like `v1.1.0`.
#
# Prerequisites (one-time setup — see the repo README / docs/PORTING.md):
#   1. The Modrinth project with slug "tweakable-xp-loss" must already exist (create it as a
#      draft via the Modrinth dashboard first; Minotaur cannot create the project).
#   2. A GitHub Actions secret named MODRINTH_TOKEN containing a Modrinth API token with the
#      VERSION_CREATE scope (https://modrinth.com/settings/account).
#
# Environment metadata (client_side/server_side) is NOT set by this workflow: Modrinth's v2
# version-create endpoint (which Minotaur uses) auto-inherits the per-version environment
# fields (singleplayer/client_and_server/client_only/server_only) from an existing version of
# the project. So once the env is set on one version (done manually via the dashboard for the
# initial release), every subsequent upload inherits it automatically. No extra scope needed.
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      # The legacy/modern eras compile on Java 21; the next era (MC 26.x) requires Java 25.
      # Install both so Gradle's toolchain resolution finds each without auto-provisioning.
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Gradle + neoformruntime
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: release-gradle-${{ hashFiles('**/*.gradle', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            release-gradle-

      - name: Publish legacy jar to Modrinth (MC 1.21.1-1.21.10)
        run: ./gradlew modrinth -Pera=legacy --no-daemon --stacktrace

      - name: Publish modern jar to Modrinth (MC 1.21.11)
        run: ./gradlew modrinth -Pera=modern --no-daemon --stacktrace

      - name: Publish next jar to Modrinth (MC 26.2, beta)
        run: ./gradlew modrinth -Pera=next --no-daemon --stacktrace

      - name: Collect jars
        run: |
          mkdir -p artifacts
          cp build/libs/tweakable_xp_loss-*.jar artifacts/
          ls -la artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*.jar
