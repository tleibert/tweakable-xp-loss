name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

# Builds all three era jars and publishes each as a separate Modrinth version, then attaches
# all jars to a GitHub Release. Triggered by pushing a tag like `v1.1.0`.
#
# Prerequisites (one-time setup — see the repo README / docs/PORTING.md):
#   1. The Modrinth project with slug "tweakable-xp-loss" must already exist (create it as a
#      draft via the Modrinth dashboard first; Minotaur cannot create the project).
#   2. A GitHub Actions secret named MODRINTH_TOKEN containing a Modrinth API token with the
#      VERSION_CREATE and PROJECT_WRITE scopes (https://modrinth.com/settings/account).
#      VERSION_CREATE publishes each version; PROJECT_WRITE sets the project's environment
#      metadata (client_side/server_side) below.
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      # The legacy/modern eras compile on Java 21; the next era (MC 26.x) requires Java 25.
      # Install both so Gradle's toolchain resolution finds each without auto-provisioning.
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Gradle + neoformruntime
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: release-gradle-${{ hashFiles('**/*.gradle', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            release-gradle-

      - name: Publish legacy jar to Modrinth (MC 1.21.1-1.21.10)
        run: ./gradlew modrinth -Pera=legacy --no-daemon --stacktrace

      - name: Publish modern jar to Modrinth (MC 1.21.11)
        run: ./gradlew modrinth -Pera=modern --no-daemon --stacktrace

      - name: Publish next jar to Modrinth (MC 26.2, beta)
        run: ./gradlew modrinth -Pera=next --no-daemon --stacktrace

      - name: Collect jars
        run: |
          mkdir -p artifacts
          cp build/libs/tweakable_xp_loss-*.jar artifacts/
          ls -la artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*.jar

      # Environment (client_side/server_side) is project-level metadata, not per-version, so
      # Minotaur can't set it. PATCH the project once per release to keep it correct (idempotent).
      # Best-effort: if MODRINTH_TOKEN lacks PROJECT_WRITE scope this warns but cannot block the
      # version uploads or GitHub Release above. Requires PROJECT_WRITE scope to actually apply.
      - name: Set Modrinth environment metadata (server-side mod)
        continue-on-error: true
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X PATCH \
            "https://api.modrinth.com/v2/project/tweakable-xp-loss" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"client_side":"optional","server_side":"required"}')
          echo "Modrinth project PATCH -> HTTP $code"
          if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
            echo "Environment metadata set: server_side=required, client_side=optional"
          else
            echo "::error::Modrinth project PATCH failed (HTTP $code). Ensure MODRINTH_TOKEN has PROJECT_WRITE scope (currently the env metadata was not updated)."
            exit 1
          fi
